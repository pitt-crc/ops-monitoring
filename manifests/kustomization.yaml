apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: crcd-monitoring
helmCharts:
  - name: grafana
    version: 12.7.2
    releaseName: grafana
    repo: https://grafana-community.github.io/helm-charts
    valuesInline:
      service:
        type: LoadBalancer

  - name: prometheus
    version: 29.14.0
    releaseName: prometheus-community
    repo: https://prometheus-community.github.io/helm-charts
    valuesFile: prometheus/values.yaml

  - name: alertmanager
    version: 1.40.2
    releaseName: alert-manager
    repo: https://prometheus-community.github.io/helm-charts
    valuesInline:
      service:
        type: LoadBalancer

resources:
  - issuers.yaml
  - alertmanager/certificates.yaml
  - grafana/certificates.yaml
  - prometheus/certificates.yaml
