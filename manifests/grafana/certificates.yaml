apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-internal-tls
spec:
  secretName: grafana-tls-server
  duration: 2160h
  renewBefore: 1440h
  issuerRef:
    name: monitoring-internal-ca
    kind: Issuer
  dnsNames:
    - grafana.crcd.pitt.edu
    - grafana
    - grafana.crcd-monitoring
    - grafana.crcd-monitoring.svc
    - grafana.crcd-monitoring.svc.cluster.local
  ipAddresses:
    - 127.0.0.1
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-public-tls
spec:
  secretName: grafana-public-tls
  issuerRef:
    name: sectigo-issuer
    kind: ClusterIssuer
  dnsNames:
    - grafana.crcd.pitt.edu
