---
apiVersion: v1
kind: Namespace
metadata:
  name: crcd-nginx
  labels:
    kubernetes.io/metadata.name: nginx
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: crcd-nginx
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: nginx
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: init-content
          image: busybox:1.37.0
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - sh
            - -c
            - |
              cat <<HTMLEOF > /usr/share/nginx/html/index.html
              <!DOCTYPE html>
              <html>
              <head><title>Hello World</title></head>
              <body><h1>Hello World from nginx</h1>
              <p>Node: ${K8S_NODE_NAME}</p>
              <p>Pod: ${POD_NAME}</p></body>
              </html>
              HTMLEOF
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
      containers:
        - name: nginx
          image: nginx:1.29.6-alpine
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 4Gi
          ports:
            - containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: content
          emptyDir: {}
