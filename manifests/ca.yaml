apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: monitoring-selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-internal-ca
spec:
  isCA: true
  commonName: monitoring-internal-ca
  secretName: tls-ca
  duration: 2160h
  renewBefore: 1440h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: monitoring-selfsigned-bootstrap
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: monitoring-internal-ca
spec:
  ca:
    secretName: tls-ca
